<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilient Pi 5 Engineering - Documentación</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js de Mozilla -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Animación suave para el scroll */
        html {
            scroll-behavior: smooth;
        }
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen font-sans selection:bg-blue-500 selection:text-white">

    <!-- Sección Hero (Encabezado) -->
    <header class="min-h-[70vh] flex flex-col items-center justify-center text-center px-4 relative overflow-hidden">
        <!-- Elementos decorativos de fondo -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
        </div>

        <div class="z-10 fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-white/10 rounded-full mb-6 backdrop-blur-sm border border-white/20">
                <i data-lucide="cpu" class="w-8 h-8 text-blue-400"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
                Resilient Pi 5 Engineering
            </h1>
            <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-10">
                Explora el documento completo directamente en la web. Desplázate hacia abajo para sumergirte en la lectura.
            </p>
            
            <a href="#pdf-viewer" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full transition-all hover:scale-105 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                Comenzar a leer
                <i data-lucide="arrow-down" class="w-5 h-5 animate-bounce"></i>
            </a>
        </div>
    </header>

    <!-- Contenedor del PDF -->
    <main id="pdf-viewer" class="max-w-5xl mx-auto px-4 py-16">
        
        <!-- Estado de carga -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <i data-lucide="loader-2" class="w-12 h-12 text-blue-500 animate-spin mb-4"></i>
            <p class="text-slate-400 text-lg font-medium" id="loading-text">Renderizando documento en alta calidad...</p>
            
            <!-- Barra de progreso -->
            <div class="w-64 h-2 bg-slate-700 rounded-full mt-4 overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Aquí se inyectarán los canvas de cada página -->
        <div id="pdf-container" class="flex flex-col items-center space-y-8"></div>
        
    </main>

    <!-- Pie de página -->
    <footer class="text-center py-8 text-slate-500 border-t border-slate-800 mt-12">
        <p>Documento cargado desde GitHub • Renderizado con PDF.js</p>
    </footer>

    <!-- Script principal -->
    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Configuración de PDF.js
        // Usamos el worker desde el mismo CDN
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // URL del PDF. 
        // IMPORTANTE: Se debe usar "raw.githubusercontent.com" para obtener el archivo directo, no la página de visor de GitHub.
        const pdfUrl = 'https://raw.githubusercontent.com/juanmartinbarrientos/Mis-Redes/main/Resilient_Pi_5_Engineering.pdf';

        const container = document.getElementById('pdf-container');
        const loadingState = document.getElementById('loading-state');
        const loadingText = document.getElementById('loading-text');
        const progressBar = document.getElementById('progress-bar');

        async function renderPDF() {
            try {
                // Cargar el documento
                loadingText.textContent = "Descargando PDF...";
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdfDoc = await loadingTask.promise;
                
                const totalPages = pdfDoc.numPages;
                
                // Ocultar el estado general de carga (dejamos solo la barra si quisieramos)
                loadingText.textContent = `Preparando ${totalPages} páginas...`;

                // Iterar sobre cada página
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdfDoc.getPage(pageNum);
                    
                    // Lógica para que el PDF sea responsive
                    // Calculamos el ancho disponible en la pantalla (dejando márgenes)
                    const desiredWidth = Math.min(window.innerWidth * 0.9, 1000); 
                    
                    // Obtenemos el viewport original para saber su proporción
                    const unscaledViewport = page.getViewport({ scale: 1 });
                    
                    // Calculamos la escala necesaria para llegar al desiredWidth
                    // Si estás en un monitor 4K y quieres más calidad, puedes aumentar el multiplicador
                    const scale = desiredWidth / unscaledViewport.width;
                    const viewport = page.getViewport({ scale: scale * 1.5 }); // *1.5 para mayor nitidez en pantallas retina

                    // Crear el elemento canvas para esta página
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Ajustar el tamaño del canvas
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    // Clases CSS para el canvas (apariencia de página física)
                    canvas.className = 'bg-white shadow-[0_10px_40px_rgba(0,0,0,0.5)] rounded-sm max-w-full h-auto fade-in';
                    
                    // Renderizar la página en el contexto del canvas
                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    // Añadir al contenedor antes de renderizar para ir mostrando progresivamente
                    container.appendChild(canvas);
                    
                    await page.render(renderContext).promise;

                    // Actualizar barra de progreso
                    const progress = (pageNum / totalPages) * 100;
                    progressBar.style.width = `${progress}%`;
                }

                // Ocultar el loader completamente al terminar
                loadingState.style.display = 'none';

            } catch (error) {
                console.error('Error al cargar el PDF:', error);
                loadingState.innerHTML = `
                    <div class="text-red-400 text-center bg-red-400/10 p-6 rounded-xl border border-red-400/20">
                        <i data-lucide="alert-triangle" class="w-10 h-10 mx-auto mb-3"></i>
                        <h3 class="font-bold text-xl mb-2">Error al cargar el documento</h3>
                        <p class="text-sm">No se pudo acceder al PDF. Asegúrate de que el repositorio sea público y la URL sea correcta.</p>
                        <p class="text-xs text-red-500/70 mt-4">${error.message}</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Iniciar el renderizado
        renderPDF();

        // Recalcular tamaño al cambiar el tamaño de la ventana (opcional, para una experiencia más fluida, 
        // aunque con "max-w-full h-auto" de Tailwind ya suele ser suficiente para adaptarse).
        // En una implementación más compleja se volverían a renderizar los canvas, pero para mantenerlo ligero lo obviamos.
    </script>
</body>
</html>
